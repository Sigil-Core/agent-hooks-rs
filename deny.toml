[graph]
all-features = true

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"
exceptions = [
  # `ironclaw` 0.24.0 pulls these in transitively. Keep the exception scoped
  # to the exact crates rather than broadening the workspace allowlist.
  { name = "clipboard-win", allow = ["BSL-1.0"] },
  { name = "error-code", allow = ["BSL-1.0"] },
  { name = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
]

[advisories]
version = 2
# `ironclaw` 0.24.0 hard-pins `wasmtime` 28.x and is the latest published
# crates.io release. Upstream `ironclaw-v0.25.0` upgraded to `wasmtime` 43.0.1
# but is not on crates.io yet. Until that release lands, the wasmtime CVEs
# below are ignored on the basis that none are reachable from this crate's
# call path:
#   * `sigil-agent-hooks-ironclaw` only imports `ironclaw::hooks::*` types
#     (Hook, HookContext, HookError, HookEvent, HookFailureMode, HookOutcome,
#     HookPoint). No `Engine`, `Module`, or `Linker` is constructed; no WASM
#     module is ever instantiated through this code path.
#   * `ironclaw` 0.24.0 enables `wasmtime` with `features = ["component-model"]`
#     on top of defaults. Winch is NOT in wasmtime 28's default feature set and
#     is NOT explicitly enabled, so RUSTSEC-2026-0095 (Winch sandbox escape)
#     code is not compiled in.
#   * RUSTSEC-2026-0096 (aarch64 Cranelift miscompile) requires wasmtime
#     execution on aarch64. CI runs x86_64 ubuntu-latest and the Sigil call
#     path never executes wasmtime regardless of arch.
# Track: https://github.com/nearai/ironclaw — bump to 0.25.0 when published.
ignore = [
  "RUSTSEC-2024-0436",
  "RUSTSEC-2025-0046",
  "RUSTSEC-2025-0057",
  "RUSTSEC-2025-0118",
  "RUSTSEC-2026-0020",
  "RUSTSEC-2026-0021",
  "RUSTSEC-2026-0085",
  "RUSTSEC-2026-0086",
  "RUSTSEC-2026-0087",
  "RUSTSEC-2026-0088",
  "RUSTSEC-2026-0089",
  "RUSTSEC-2026-0091",
  "RUSTSEC-2026-0092",
  "RUSTSEC-2026-0093",
  "RUSTSEC-2026-0094",
  "RUSTSEC-2026-0095",
  "RUSTSEC-2026-0096",
]
