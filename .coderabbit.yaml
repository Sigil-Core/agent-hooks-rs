# .coderabbit.yaml — agent-hooks-rs (Rust, crates.io workspace)

reviews:
  auto_review:
    enabled: true

  path_instructions:
    - path: "crates/**/*.rs"
      instructions: |
        This is the Rust implementation of Sigil agent hooks, published to crates.io.
        Workspace contains sigil-agent-hooks-core and sigil-agent-hooks-ironclaw.
        - Verify unsafe blocks are justified and documented.
        - Check error handling uses thiserror or anyhow consistently.
        - Flag any unwrap() or expect() outside of tests.
        - Confirm public API changes are semver-appropriate.
        - Check that ironclaw integration stays isolated in its own crate.

    - path: "crates/sigil-agent-hooks-core/**"
      instructions: |
        Core crate must remain framework-agnostic. No ironclaw-specific types here.
        - Verify traits and interfaces are well-documented.
        - Flag any framework-specific dependencies.

    - path: "crates/sigil-agent-hooks-ironclaw/**"
      instructions: |
        Ironclaw adapter crate. Bridges core hooks to the ironclaw runtime.
        - Check version compatibility with upstream ironclaw releases.
        - Flag any wasmtime version constraints or advisory workarounds.

    - path: "deny.toml"
      instructions: |
        - Verify license exceptions are scoped to exact crate+version.
        - Flag any blanket license allows.
        - Check advisory ignores have expiration comments or upstream references.

    - path: ".cargo/audit.toml"
      instructions: |
        - Verify advisory ignores reference specific RUSTSEC IDs.
        - Check that each ignore has a comment explaining why and when it can be removed.

    - path: "Cargo.toml"
      instructions: |
        - Confirm version follows semver.
        - Check for wildcard dependency versions.
        - Verify publish metadata (description, license, repository) is present for each published crate.

    - path: "**/*.md"
      instructions: |
        Check for accuracy against the current code. Flag stale references.

  path_filters:
    - "!target/**"
    - "!*.lock"
